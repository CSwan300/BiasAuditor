name: CI — Bias Auditor

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master, Update1]

# Prevents multiple redundant builds from running simultaneously on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Quality & Python Logic ────────────────────────────────────────────
  test-backend:
    name: Backend QA (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov ruff httpx

      - name: Lint with Ruff
        run: ruff check .

      - name: Run Pytest with Coverage
        run: |
          PYTHONPATH=. pytest backend/tests/ --cov=backend --cov-report=xml --cov-fail-under=80

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── 2. Frontend Validation ───────────────────────────────────────────────
  build-frontend:
    name: Frontend Quality (Vitest & Build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Test
        run: |
          cd frontend
          npm ci
          # Executes 'vitest run' per your package.json
          npm run test:run

      - name: Build
        run: |
          cd frontend
          npm run build

  # ── 3. Docker Deployment ─────────────────────────────────────────────────
  docker-deploy:
    name: Docker Hub Push
    runs-on: ubuntu-latest
    # Only deploys if both backend and frontend jobs pass successfully
    needs: [test-backend, build-frontend]
    # Restrict deployment to the master branch
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/bake-action@v5
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          push: true