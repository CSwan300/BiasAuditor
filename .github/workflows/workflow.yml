name: CI — Bias Auditor

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Run Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov ruff  # Ensure test tools are installed

      - name: Lint with ruff
        run: |
          ruff check backend/ tests/ --select E,F,W --ignore E501
        continue-on-error: true

      - name: Run tests with coverage
        run: |
          # Using python -m pytest fixes the ModuleNotFoundError
          python -m pytest tests/ \
            --tb=short \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml \
            -v
        env:
          PYTHONPATH: .

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # Required for many v4+ uploads
          files: ./coverage.xml
          fail_ci_if_error: false

  build-check:
    name: Verify App Starts
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Start server and smoke test
        run: |
          # Use python -m uvicorn for reliability
          python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          sleep 5 # Increased slightly to give FastAPI time to boot
          curl -f http://localhost:8000/health || exit 1
          curl -f http://localhost:8000/sample-schema || exit 1
          echo "✅ Server started and health check passed"
        env:
          PYTHONPATH: .