name: CI — Bias Auditor

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Run Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          # PYTHONPATH=. ensures pytest sees the 'backend' folder
          PYTHONPATH=. pytest tests/ \
            --tb=short \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }} # Required for private repos
          fail_ci_if_error: false

  docker-smoke-test:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Start Services
        run: |
          # Use the environment variable for compatibility
          export DOCKER_API_VERSION="1.47"
          docker compose up -d --build

      - name: Wait for Backend
        run: |
          echo "Waiting for FastAPI to start..."
          # Give it a moment to boot up
          sleep 10
          # Check backend directly
          curl -f http://localhost:8000/docs || exit 1

      - name: Verify Nginx Proxy
        run: |
          # This tests the full chain: Nginx (8080) -> FastAPI (8000)
          # We use /api/health (assuming you have a @app.get("/health") in main.py)
          curl -v http://localhost:8080/api/health || curl -v http://localhost:8080/health.txt || exit 1

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose logs
          docker ps -a