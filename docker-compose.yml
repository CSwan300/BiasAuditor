services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-stage
    container_name: bias-auditor-api
    restart: unless-stopped
    ports:
      - "8000:8000" # Maps container port 8000 to your host port 8000
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - bias-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-stage
    container_name: bias-auditor-ui
    restart: unless-stopped
    ports:
      - "8080:80"   # Access the UI via http://localhost:8080
    depends_on:
      - backend
    networks:
      - bias-net

networks:
  bias-net:
    driver: bridge