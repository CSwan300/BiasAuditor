services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-stage
    container_name: bias-auditor-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - bias-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-stage
    container_name: bias-auditor-ui
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bias-net

networks:
  bias-net:
    driver: bridge